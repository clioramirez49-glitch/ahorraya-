<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AhorraYa – Asistente de Ahorro</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(251,146,60,0.4); border-radius: 4px; }
    body {
      font-family: 'DM Sans', sans-serif; color: #fff;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; position: relative; overflow-x: hidden;
      background: #1a0f0a;
    }
    .blob { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
    .blob-1 { width: 520px; height: 520px; background: #c2410c; opacity: .12; top: -180px; left: -180px; }
    .blob-2 { width: 420px; height: 420px; background: #9a3412; opacity: .1; bottom: -100px; right: -100px; }
    .blob-3 { width: 300px; height: 300px; background: #fb923c; opacity: .06; top: 45%; left: 50%; transform: translateX(-50%); }

    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 680px; display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 2rem; }

    /* HEADER */
    header {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.1rem 1.4rem;
      background: rgba(26,15,10,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(251,146,60,0.15);
      position: sticky; top: 0; z-index: 100;
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 13px;
      background: linear-gradient(135deg,#ea580c,#fb923c);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; box-shadow: 0 0 22px rgba(251,146,60,.35);
      flex-shrink: 0;
    }
    .logo-text { font-family: 'Syne', sans-serif; font-size: 1.55rem; font-weight: 800; letter-spacing: -.5px; color: #fff; }
    .logo-sub { font-size: .7rem; color: rgba(251,146,60,.75); text-transform: uppercase; letter-spacing: .5px; margin-top: 1px; }
    .badge {
      margin-left: auto;
      background: rgba(251,146,60,.1); border: 1px solid rgba(251,146,60,.3);
      border-radius: 20px; padding: .3rem .85rem;
      color: #fb923c; font-size: .7rem; font-weight: 600;
      display: flex; align-items: center; gap: .4rem; white-space: nowrap;
    }
    .badge::before { content:''; width:7px; height:7px; border-radius:50%; background:#fb923c; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    main { flex: 1; padding: 0 1rem; display: flex; flex-direction: column; }

    /* TABS */
    .tabs { display: flex; gap: .5rem; margin-top: 1.1rem; }
    .tab-btn {
      flex: 1; padding: .72rem 1rem; border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.4); font-weight: 600;
      font-family: 'DM Sans', sans-serif; font-size: .88rem;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: .45rem;
    }
    .tab-btn.active { background: rgba(251,146,60,.13); border-color: rgba(251,146,60,.45); color: #fb923c; }
    .tab-count { background: #ea580c; color: #fff; border-radius: 20px; padding: .08rem .5rem; font-size: .7rem; font-weight: 700; }

    .panel { display: none; flex-direction: column; gap: .8rem; margin-top: 1rem; flex: 1; }
    .panel.active { display: flex; }

    /* CHAT */
    .messages {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px; padding: 1.1rem;
      min-height: 300px; max-height: 420px;
      overflow-y: auto; display: flex; flex-direction: column; gap: .9rem;
    }
    .msg-row { display: flex; }
    .msg-row.user { justify-content: flex-end; }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg,#ea580c,#fb923c);
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem; flex-shrink: 0; margin-right: .6rem; margin-top: 2px;
    }
    .bubble { max-width: 82%; padding: .8rem 1rem; border-radius: 18px; font-size: .88rem; line-height: 1.6; }
    .bubble.user {
      background: linear-gradient(135deg,#ea580c,#f97316);
      color: #fff; font-weight: 500; border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      background: rgba(255,255,255,.07); color: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.08); border-bottom-left-radius: 4px;
    }
    .dots { display: flex; gap: 4px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #fb923c; animation: bounce 1.2s infinite; }
    .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .quick-wrap { display: flex; flex-wrap: wrap; gap: .4rem; }
    .quick-btn {
      padding: .42rem .85rem; border-radius: 20px;
      border: 1px solid rgba(251,146,60,.28); background: rgba(251,146,60,.07);
      color: rgba(255,255,255,.72); font-size: .77rem;
      font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all .18s;
    }
    .quick-btn:hover { background: rgba(251,146,60,.16); color: #fff; border-color: rgba(251,146,60,.55); }

    .input-row { display: flex; gap: .55rem; }
    .chat-input, .list-input {
      flex: 1; padding: .88rem 1.05rem; border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,.1); background: rgba(255,255,255,.06);
      color: #fff; font-size: .9rem; font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color .2s;
    }
    .chat-input:focus, .list-input:focus { border-color: rgba(251,146,60,.5); }
    .chat-input::placeholder, .list-input::placeholder { color: rgba(255,255,255,.3); }
    .send-btn, .add-btn {
      padding: .88rem 1.2rem; border-radius: 14px; border: none;
      background: linear-gradient(135deg,#ea580c,#f97316);
      color: #fff; font-size: 1.1rem; cursor: pointer;
      box-shadow: 0 4px 18px rgba(234,88,12,.35); transition: opacity .2s;
    }
    .add-btn { padding: .88rem 1rem; font-size: 1.4rem; }
    .send-btn:hover, .add-btn:hover { opacity: .88; }

    /* LIST */
    .list-stats { display: flex; gap: .65rem; }
    .stat-pill { flex: 1; padding: .65rem .9rem; border-radius: 14px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); text-align: center; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 1.35rem; font-weight: 800; color: #fb923c; }
    .stat-label { font-size: .68rem; color: rgba(255,255,255,.4); margin-top: 1px; }

    .items-list { display: flex; flex-direction: column; gap: .38rem; }
    .item-row {
      display: flex; align-items: center; gap: .72rem;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px; padding: .75rem 1rem; animation: slideIn .2s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .item-row.done { opacity: .4; }
    .item-check {
      width: 22px; height: 22px; border-radius: 8px;
      border: 2px solid rgba(251,146,60,.45); background: transparent;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: all .15s; font-size: .75rem;
    }
    .item-check.checked { background: #ea580c; border-color: #ea580c; }
    .item-name { flex: 1; font-size: .92rem; color: rgba(255,255,255,.88); font-weight: 500; }
    .item-name.done { text-decoration: line-through; color: rgba(255,255,255,.3); }
    .rm-btn { background: none; border: none; color: rgba(255,100,100,.5); cursor: pointer; font-size: 1rem; transition: color .15s; line-height: 1; }
    .rm-btn:hover { color: rgba(255,100,100,.9); }

    .empty { text-align: center; padding: 2.5rem 1rem; color: rgba(255,255,255,.25); font-size: .88rem; line-height: 1.9; }
    .empty-icon { font-size: 2.5rem; display: block; margin-bottom: .5rem; }

    .analyze-btn {
      padding: 1rem 1.5rem; border-radius: 16px; border: none;
      background: linear-gradient(135deg,#ea580c,#f97316);
      color: #fff; font-weight: 700; font-size: 1rem;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      box-shadow: 0 6px 24px rgba(234,88,12,.4); transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: .55rem;
    }
    .analyze-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(234,88,12,.5); }
    .analyze-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    @media(min-width:600px){ .messages{ max-height:520px; } }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="wrapper">
    <header>
      <div class="logo-icon">🛒</div>
      <div>
        <div class="logo-text">AhorraYa</div>
        <div class="logo-sub">Asistente de ahorro inteligente</div>
      </div>
      <div class="badge">IA Activa</div>
    </header>
    <main>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('chat')">💬 Asistente</button>
        <button class="tab-btn" id="list-tab-btn" onclick="switchTab('list')">🛒 Mi Lista</button>
      </div>

      <!-- CHAT -->
      <div class="panel active" id="panel-chat">
        <div class="messages" id="messages"></div>
        <div class="quick-wrap" id="quick-wrap">
          <button class="quick-btn" onclick="sendMsg('¿Cómo ahorrar en proteínas como pollo o carne?')">🥩 ¿Cómo ahorrar en proteínas?</button>
          <button class="quick-btn" onclick="sendMsg('¿Cuándo es mejor comprar frutas y verduras baratas?')">🥦 ¿Cuándo comprar frutas baratas?</button>
          <button class="quick-btn" onclick="sendMsg('Tengo $300 pesos, ¿qué puedo cocinar esta semana?')">💰 Con $300 ¿qué cocino?</button>
          <button class="quick-btn" onclick="sendMsg('¿Qué marcas propias del súper son buenas y económicas?')">🏷️ ¿Marcas propias buenas?</button>
        </div>
        <div class="input-row">
          <input class="chat-input" id="chat-input" placeholder="Escribe tu pregunta de ahorro..." onkeydown="if(event.key==='Enter')sendMsg()" />
          <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>

      <!-- LIST -->
      <div class="panel" id="panel-list">
        <div class="input-row">
          <input class="list-input" id="list-input" placeholder="Agrega un producto (ej: leche, pollo...)" onkeydown="if(event.key==='Enter')addItem()" />
          <button class="add-btn" onclick="addItem()">+</button>
        </div>
        <div class="list-stats" id="list-stats" style="display:none">
          <div class="stat-pill"><div class="stat-num" id="stat-total">0</div><div class="stat-label">productos</div></div>
          <div class="stat-pill"><div class="stat-num" id="stat-done">0</div><div class="stat-label">comprados</div></div>
          <div class="stat-pill"><div class="stat-num" id="stat-left">0</div><div class="stat-label">pendientes</div></div>
        </div>
        <div id="items-container">
          <div class="empty" id="empty-state"><span class="empty-icon">🛒</span>Tu lista está vacía.<br>Agrega productos arriba y luego<br><strong style="color:rgba(251,146,60,.75)">analiza cómo ahorrar</strong></div>
          <div class="items-list" id="items-list"></div>
        </div>
        <button class="analyze-btn" id="analyze-btn" onclick="analyzeList()" disabled>✨ Analizar lista y encontrar ahorros</button>
      </div>
    </main>
  </div>

  <script>
    let items = [], idCounter = 0;

    const RESPUESTAS = [
      { keys: ['proteína','proteinas','pollo','carne','res','cerdo','pechuga'],
        resp: `🥩 <strong>Cómo ahorrar en proteínas:</strong><br><br>🐔 <strong>Pollo entero vs piezas:</strong> Comprar pollo entero puede ser hasta 40% más barato que comprarlo en piezas. Pídele al carnicero que lo corte.<br><br>🥚 <strong>Huevo:</strong> Es la proteína más económica. Una docena (~$35) equivale en proteína a 500g de pecho de pollo (~$80).<br><br>🐟 <strong>Atún en lata:</strong> Marca propia del Walmart (Great Value) o Chedraui cuesta ~$18 por lata.<br><br>🛒 <strong>Día de descuentos:</strong> Walmart tiene descuentos en carnes los <strong>martes y miércoles</strong>. Chedraui los <strong>jueves</strong>.<br><br>💡 <strong>Tip:</strong> Compra en cantidad cuando hay oferta y congela. Puedes ahorrar hasta un <strong>30%</strong>.` },
      { keys: ['fruta','verdura','vegetal','jitomate','tomate','cebolla','chile','aguacate','limón','limon'],
        resp: `🥦 <strong>Cómo ahorrar en frutas y verduras:</strong><br><br>📅 <strong>Mejor día para comprar:</strong> Los <strong>martes y miércoles</strong> los supermercados reciben producto fresco con descuentos de hasta 25%.<br><br>🏪 <strong>Mercado vs Súper:</strong> En el mercado local las frutas y verduras cuestan entre 20-40% menos.<br><br>🥑 <strong>Aguacate:</strong> Compra cuando baje de $30/kg. Guárdalo verde en el refri para que madure despacio.<br><br>💡 <strong>Tip de temporada:</strong> En junio: mango, sandía y elote son las opciones más económicas. Hasta 50% más baratas que fuera de temporada.` },
      { keys: ['300','200','400','500','100','presupuesto','poco dinero','barato','económico','economico','semana','cocinar'],
        resp: `💰 <strong>Menú económico para la semana con ~$300:</strong><br><br>🛒 <strong>Lista de compras (~$280):</strong><br>• Arroz 1kg — $25<br>• Frijoles 1kg — $35<br>• Huevo 12pz — $38<br>• Pollo 1kg — $75<br>• Papa 1kg — $20<br>• Cebolla/ajo/chile — $25<br>• Jitomate 1kg — $22<br>• Aceite 500ml — $30<br>• Tortillas 1kg — $25<br><br>🍽️ <strong>Con esto puedes hacer:</strong> Caldo de pollo, arroz con huevo, frijoles de olla, papas fritas, quesadillas, enfrijoladas.<br><br>💡 El arroz y los frijoles son los alimentos más eficientes en costo-nutrición que existen.` },
      { keys: ['marca','propia','walmart','chedraui','soriana','bodega','aurrera','great value','precio uno'],
        resp: `🏷️ <strong>Marcas propias que sí valen la pena:</strong><br><br>🟦 <strong>Walmart / Bodega Aurrerá:</strong> Great Value — aceite, arroz, frijoles, atún, papel. Ahorro vs marca líder: <strong>30-45%</strong><br><br>🟠 <strong>Chedraui:</strong> Precio Uno — leche, azúcar, harina, jabón. Calidad muy similar a marcas conocidas.<br><br>🔴 <strong>Soriana:</strong> Soriana Básico — lácteos, cereales, productos de limpieza.<br><br>✅ <strong>SÍ conviene marca propia:</strong> arroz, azúcar, sal, aceite, harina, frijoles, papel, jabón.<br><br>❌ <strong>Puede no convenir:</strong> medicamentos, café, crema de cacahuate.` },
      { keys: ['oferta','descuento','promoción','promocion','cuándo','cuando','dia','días','dias'],
        resp: `📅 <strong>Mejores días para encontrar ofertas:</strong><br><br>🟦 <strong>Walmart / Bodega:</strong> Martes y miércoles — descuentos en carnes y frescos.<br><br>🟠 <strong>Chedraui:</strong> Jueves — "Día del ahorro" con descuentos en toda la tienda.<br><br>🔴 <strong>Soriana:</strong> Lunes — ofertas de inicio de semana en abarrotes.<br><br>🕐 <strong>Mejor hora:</strong> Por la <strong>noche (7-9pm)</strong> bajan precio de pan, lácteos y carnes próximos a vencer.<br><br>💡 La primera semana del mes tiene las mejores promociones en limpieza e higiene.` },
      { keys: ['leche','lacteo','lácteo','yogurt','queso','crema','mantequilla'],
        resp: `🥛 <strong>Cómo ahorrar en lácteos:</strong><br><br>🥛 <strong>Leche:</strong> La leche en polvo sale hasta 35% más barata y dura mucho más.<br><br>🧀 <strong>Queso:</strong> El queso a granel en mercados locales es más barato que el empaquetado del súper.<br><br>🥄 <strong>Yogurt:</strong> El yogurt natural sin sabor es más económico. Agrégale fruta de temporada tú mismo.<br><br>💡 Compra lácteos los <strong>martes en Walmart</strong> o los <strong>jueves en Chedraui</strong> cuando hay descuentos en refrigerados.` },
      { keys: ['limpieza','detergente','jabón','jabon','suavizante','cloro'],
        resp: `🧹 <strong>Cómo ahorrar en limpieza:</strong><br><br>💧 <strong>Concentrados:</strong> Una bolsa de detergente concentrado (~$35) rinde igual que 3 botellas de ~$40.<br><br>🏷️ <strong>Marca propia:</strong> En limpieza del hogar las marcas propias son casi idénticas. Ahorro: <strong>40-50%</strong><br><br>🍋 <strong>Alternativas naturales:</strong> Vinagre blanco + bicarbonato reemplazan varios productos. Costo: ~$15 vs ~$60 comerciales.<br><br>📅 Primera semana del mes — los súpers sacan 2x1 o 3x2 en limpieza.` },
      { keys: ['ahorrar','ahorro','consejos','tips','ayuda','cómo','como','dinero','gasto','gastar'],
        resp: `💡 <strong>Los 7 mejores consejos para ahorrar en el súper:</strong><br><br>1️⃣ <strong>Haz una lista antes de ir</strong> — quien va sin lista gasta en promedio 23% más.<br><br>2️⃣ <strong>No vayas con hambre</strong> — el hambre impulsa compras no planeadas.<br><br>3️⃣ <strong>Compara precio por kilo/litro</strong>, no por precio total del empaque.<br><br>4️⃣ <strong>Compra marcas propias</strong> en básicos: arroz, azúcar, aceite, papel, jabón.<br><br>5️⃣ <strong>Aprovecha los días de descuento</strong> de cada súper.<br><br>6️⃣ <strong>Congela cuando hay oferta</strong> — especialmente carnes y pan.<br><br>7️⃣ <strong>Compara entre tiendas</strong> — no todo es más barato en el mismo lugar.<br><br>📊 Aplicando estos consejos puedes ahorrar entre <strong>$300 y $800 pesos al mes</strong>.` }
    ];

    const FALLBACK = `🤔 Aquí algunos consejos generales de ahorro en el súper:<br><br>✅ Haz tu lista antes de ir y respétala.<br>✅ Compara precio por kilo o litro, no por precio total.<br>✅ Elige marcas propias en productos básicos.<br>✅ Aprovecha días de descuento: <strong>martes en Walmart, jueves en Chedraui</strong>.<br>✅ Congela productos en oferta.<br><br>💬 Puedes preguntarme sobre: proteínas, frutas, lácteos, limpieza, marcas propias, o un menú económico para la semana.`;

    function getResp(text) {
      const t = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      for (const r of RESPUESTAS) {
        if (r.keys.some(k => t.includes(k.normalize("NFD").replace(/[\u0300-\u036f]/g,"")))) return r.resp;
      }
      return FALLBACK;
    }

    function switchTab(t) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active',(t==='chat'&&i===0)||(t==='list'&&i===1)));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-'+t).classList.add('active');
    }

    function appendMsg(role, html) {
      const box = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'msg-row '+role;
      row.innerHTML = role==='assistant'
        ? `<div class="avatar">🤖</div><div class="bubble assistant">${html}</div>`
        : `<div class="bubble user">${html}</div>`;
      box.appendChild(row); box.scrollTop = box.scrollHeight;
    }

    function showTyping() {
      const box = document.getElementById('messages');
      const row = document.createElement('div');
      row.className='msg-row assistant'; row.id='typing';
      row.innerHTML=`<div class="avatar">🤖</div><div class="bubble assistant"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
      box.appendChild(row); box.scrollTop=box.scrollHeight;
    }
    function hideTyping() { document.getElementById('typing')?.remove(); }
    function hideQuick() { const q=document.getElementById('quick-wrap'); if(q) q.style.display='none'; }

    function sendMsg(text) {
      const inp = document.getElementById('chat-input');
      const val = text || inp.value.trim();
      if (!val) return;
      appendMsg('user', val);
      inp.value=''; hideQuick(); showTyping();
      setTimeout(() => { hideTyping(); appendMsg('assistant', getResp(val)); }, 1200);
    }

    function addItem() {
      const inp = document.getElementById('list-input');
      const val = inp.value.trim();
      if (!val) return;
      items.push({ id: ++idCounter, name: val, checked: false });
      inp.value=''; renderList();
    }

    function toggleItem(id) {
      const item = items.find(i=>i.id===id);
      if (item) { item.checked=!item.checked; renderList(); }
    }

    function removeItem(id) { items=items.filter(i=>i.id!==id); renderList(); }

    function renderList() {
      const list=document.getElementById('items-list');
      const empty=document.getElementById('empty-state');
      const stats=document.getElementById('list-stats');
      const btn=document.getElementById('analyze-btn');
      const tabBtn=document.getElementById('list-tab-btn');
      const done=items.filter(i=>i.checked).length;
      list.innerHTML='';
      empty.style.display=items.length?'none':'block';
      stats.style.display=items.length?'flex':'none';
      btn.disabled=!items.length;
      document.getElementById('stat-total').textContent=items.length;
      document.getElementById('stat-done').textContent=done;
      document.getElementById('stat-left').textContent=items.length-done;
      tabBtn.innerHTML=`🛒 Mi Lista${items.length?`<span class="tab-count">${items.length}</span>`:''}`;
      items.forEach(item => {
        const row=document.createElement('div');
        row.className='item-row'+(item.checked?' done':'');
        row.innerHTML=`<div class="item-check ${item.checked?'checked':''}" onclick="toggleItem(${item.id})">${item.checked?'✓':''}</div><span class="item-name ${item.checked?'done':''}">${item.name}</span><button class="rm-btn" onclick="removeItem(${item.id})">✕</button>`;
        list.appendChild(row);
      });
    }

    function getProductTip(nombre) {
      const n=nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      if (/pollo|pechuga|muslo|pierna/.test(n)) return "Compra pollo entero y pídele al carnicero que lo corte. Ahorra hasta 40% vs piezas sueltas.";
      if (/carne|res|bistec|milanesa|molida/.test(n)) return "Busca el miércoles en Walmart o jueves en Chedraui, hay descuentos en carnes frescas.";
      if (/leche/.test(n)) return "La marca Great Value (Walmart) sale ~$8 más barata por litro con calidad similar.";
      if (/huevo/.test(n)) return "Compra por kilo o caja de 30 piezas, sale más barato que por docena.";
      if (/arroz/.test(n)) return "El arroz a granel o en bolsa de 2kg de marca propia puede costar 30% menos.";
      if (/frijol/.test(n)) return "Compra frijol a granel. Evita los enlatados, cuestan el doble.";
      if (/aceite/.test(n)) return "Great Value o Precio Uno son excelentes. Ahorra hasta 45% vs Nutrioli.";
      if (/azúcar|azucar/.test(n)) return "Compra marca propia, el azúcar es exactamente el mismo producto.";
      if (/papa|patata/.test(n)) return "Compra en bolsa de 2kg. En el mercado local pueden costar 25% menos.";
      if (/jitomate|tomate/.test(n)) return "El jitomate suelto es más barato que el empacado. Compra los martes.";
      if (/cebolla/.test(n)) return "Compra en bolsa de malla de 1kg o 2kg, sale más barato que por pieza.";
      if (/jabón|jabon|detergente/.test(n)) return "Elige marca propia o versión concentrada. Ahorro potencial: 40-50%.";
      if (/pan/.test(n)) return "Por la noche (7-9pm) los súpers bajan precio del pan próximo a vencer. Puedes congelarlo.";
      if (/atún|atun/.test(n)) return "Great Value o Herdez son las opciones más económicas y de buena calidad.";
      if (/agua/.test(n)) return "Un garrafón de 20L (~$25) es mucho más económico que botellas individuales.";
      return "Busca la marca propia del súper. En básicos puedes ahorrar entre 25-40%.";
    }

    function analyzeList() {
      if (!items.length) return;
      let resp=`📋 <strong>Análisis de tu lista (${items.length} productos):</strong><br><br>`;
      items.forEach(i => { resp+=`🛒 <strong>${i.name}:</strong> ${getProductTip(i.name)}<br><br>`; });
      resp+=`💰 <strong>Ahorro potencial estimado:</strong> Entre 20-35% si sigues estas recomendaciones.`;
      switchTab('chat');
      appendMsg('user',`📋 Analizar mi lista (${items.length} producto${items.length>1?'s':''})`);
      hideQuick(); showTyping();
      setTimeout(() => { hideTyping(); appendMsg('assistant', resp); }, 1500);
    }

    appendMsg('assistant','¡Hola! 👋 Soy <strong>AhorraYa</strong>, tu asistente de ahorro en el súper.<br><br>Puedes escribirme lo que necesitas o agregar productos a tu lista para que yo analice cómo ahorrar. ¿Empezamos? 🛒');
  </script>
</body>
