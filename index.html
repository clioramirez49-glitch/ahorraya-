<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AhorraYa – Asistente de Ahorro</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(251,146,60,0.4); border-radius: 4px; }
    body { font-family: 'DM Sans', sans-serif; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; position: relative; overflow-x: hidden; background: #1a0f0a; }
    .blob { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
    .blob-1 { width: 520px; height: 520px; background: #c2410c; opacity: .12; top: -180px; left: -180px; }
    .blob-2 { width: 420px; height: 420px; background: #9a3412; opacity: .1; bottom: -100px; right: -100px; }
    .blob-3 { width: 300px; height: 300px; background: #fb923c; opacity: .06; top: 45%; left: 50%; transform: translateX(-50%); }
    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 700px; display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 2rem; }
    header { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.4rem; background: rgba(26,15,10,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(251,146,60,0.15); position: sticky; top: 0; z-index: 100; }
    .logo-icon { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg,#ea580c,#fb923c); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; box-shadow: 0 0 20px rgba(251,146,60,.3); flex-shrink: 0; }
    .logo-text { font-family: 'Syne', sans-serif; font-size: 1.45rem; font-weight: 800; letter-spacing: -.5px; color: #fff; }
    .logo-sub { font-size: .65rem; color: rgba(251,146,60,.7); text-transform: uppercase; letter-spacing: .5px; margin-top: 1px; }
    .badge { margin-left: auto; background: rgba(251,146,60,.1); border: 1px solid rgba(251,146,60,.3); border-radius: 20px; padding: .28rem .8rem; color: #fb923c; font-size: .68rem; font-weight: 600; display: flex; align-items: center; gap: .35rem; white-space: nowrap; }
    .badge::before { content:''; width:6px; height:6px; border-radius:50%; background:#fb923c; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* STORE SELECTOR */
    .store-bar { display: flex; gap: .4rem; padding: .75rem 1rem; overflow-x: auto; border-bottom: 1px solid rgba(255,255,255,.05); scrollbar-width: none; }
    .store-bar::-webkit-scrollbar { display: none; }
    .store-btn { flex-shrink: 0; padding: .38rem .9rem; border-radius: 20px; border: 1.5px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04); color: rgba(255,255,255,.5); font-size: .78rem; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: .35rem; }
    .store-btn.active { background: rgba(251,146,60,.15); border-color: rgba(251,146,60,.5); color: #fb923c; }
    .store-btn.active .store-dot { background: #fb923c; }
    .store-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.2); flex-shrink: 0; }

    main { flex: 1; padding: 0 1rem; display: flex; flex-direction: column; }

    /* TABS */
    .tabs { display: flex; gap: .4rem; margin-top: 1rem; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { flex-shrink: 0; padding: .65rem .9rem; border-radius: 12px; border: 1.5px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04); color: rgba(255,255,255,.4); font-weight: 600; font-family: 'DM Sans', sans-serif; font-size: .82rem; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: .4rem; white-space: nowrap; }
    .tab-btn.active { background: rgba(251,146,60,.13); border-color: rgba(251,146,60,.45); color: #fb923c; }
    .tab-count { background: #ea580c; color: #fff; border-radius: 20px; padding: .06rem .45rem; font-size: .68rem; font-weight: 700; }

    .panel { display: none; flex-direction: column; gap: .75rem; margin-top: .9rem; flex: 1; }
    .panel.active { display: flex; }

    /* CHAT */
    .messages { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 18px; padding: 1rem; min-height: 280px; max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: .85rem; }
    .msg-row { display: flex; }
    .msg-row.user { justify-content: flex-end; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,#ea580c,#fb923c); display: flex; align-items: center; justify-content: center; font-size: .78rem; flex-shrink: 0; margin-right: .55rem; margin-top: 2px; }
    .bubble { max-width: 84%; padding: .75rem .95rem; border-radius: 16px; font-size: .86rem; line-height: 1.6; }
    .bubble.user { background: linear-gradient(135deg,#ea580c,#f97316); color: #fff; font-weight: 500; border-bottom-right-radius: 4px; }
    .bubble.assistant { background: rgba(255,255,255,.07); color: rgba(255,255,255,.9); border: 1px solid rgba(255,255,255,.08); border-bottom-left-radius: 4px; }
    .dots { display: flex; gap: 4px; align-items: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #fb923c; animation: bounce 1.2s infinite; }
    .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .quick-wrap { display: flex; flex-wrap: wrap; gap: .38rem; }
    .quick-btn { padding: .38rem .8rem; border-radius: 20px; border: 1px solid rgba(251,146,60,.28); background: rgba(251,146,60,.07); color: rgba(255,255,255,.72); font-size: .75rem; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all .18s; }
    .quick-btn:hover { background: rgba(251,146,60,.16); color: #fff; }

    .input-row { display: flex; gap: .5rem; }
    .chat-input, .list-input { flex: 1; padding: .82rem 1rem; border-radius: 13px; border: 1.5px solid rgba(255,255,255,.1); background: rgba(255,255,255,.06); color: #fff; font-size: .88rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s; }
    .chat-input:focus, .list-input:focus { border-color: rgba(251,146,60,.5); }
    .chat-input::placeholder, .list-input::placeholder { color: rgba(255,255,255,.3); }
    .send-btn, .add-btn { padding: .82rem 1.1rem; border-radius: 13px; border: none; background: linear-gradient(135deg,#ea580c,#f97316); color: #fff; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 16px rgba(234,88,12,.3); transition: opacity .2s; }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* LIST */
    .list-stats { display: flex; gap: .6rem; }
    .stat-pill { flex: 1; padding: .6rem .8rem; border-radius: 13px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); text-align: center; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800; color: #fb923c; }
    .stat-label { font-size: .65rem; color: rgba(255,255,255,.4); margin-top: 1px; }
    .items-list { display: flex; flex-direction: column; gap: .35rem; }
    .item-row { display: flex; align-items: center; gap: .65rem; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 11px; padding: .7rem .95rem; animation: slideIn .2s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .item-row.done { opacity: .4; }
    .item-check { width: 20px; height: 20px; border-radius: 7px; border: 2px solid rgba(251,146,60,.4); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; font-size: .72rem; }
    .item-check.checked { background: #ea580c; border-color: #ea580c; }
    .item-name { flex: 1; font-size: .9rem; color: rgba(255,255,255,.88); font-weight: 500; }
    .item-name.done { text-decoration: line-through; color: rgba(255,255,255,.3); }
    .rm-btn { background: none; border: none; color: rgba(255,100,100,.45); cursor: pointer; font-size: .95rem; transition: color .15s; line-height: 1; }
    .rm-btn:hover { color: rgba(255,100,100,.9); }
    .empty { text-align: center; padding: 2rem 1rem; color: rgba(255,255,255,.25); font-size: .86rem; line-height: 1.9; }
    .empty-icon { font-size: 2.2rem; display: block; margin-bottom: .5rem; }
    .analyze-btn { padding: .95rem 1.4rem; border-radius: 15px; border: none; background: linear-gradient(135deg,#ea580c,#f97316); color: #fff; font-weight: 700; font-size: .95rem; font-family: 'DM Sans', sans-serif; cursor: pointer; box-shadow: 0 5px 20px rgba(234,88,12,.35); transition: all .2s; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .analyze-btn:hover { transform: translateY(-1px); }
    .analyze-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    /* CANASTA */
    .canasta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .45rem; }
    .canasta-item { display: flex; align-items: center; gap: .6rem; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 11px; padding: .65rem .85rem; cursor: pointer; transition: all .18s; }
    .canasta-item:hover { background: rgba(251,146,60,.1); border-color: rgba(251,146,60,.3); }
    .canasta-item.selected { background: rgba(251,146,60,.15); border-color: rgba(251,146,60,.5); }
    .canasta-icon { font-size: 1.1rem; flex-shrink: 0; }
    .canasta-name { font-size: .82rem; color: rgba(255,255,255,.85); font-weight: 500; flex: 1; }
    .canasta-check { width: 18px; height: 18px; border-radius: 6px; border: 1.5px solid rgba(251,146,60,.35); background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: .68rem; transition: all .15s; }
    .canasta-item.selected .canasta-check { background: #ea580c; border-color: #ea580c; }
    .canasta-actions { display: flex; gap: .5rem; }
    .canasta-add-btn { flex: 1; padding: .82rem; border-radius: 13px; border: none; background: linear-gradient(135deg,#ea580c,#f97316); color: #fff; font-weight: 700; font-size: .88rem; font-family: 'DM Sans', sans-serif; cursor: pointer; box-shadow: 0 4px 16px rgba(234,88,12,.3); }
    .canasta-analyze-btn { flex: 1; padding: .82rem; border-radius: 13px; border: 1.5px solid rgba(251,146,60,.4); background: rgba(251,146,60,.08); color: #fb923c; font-weight: 700; font-size: .88rem; font-family: 'DM Sans', sans-serif; cursor: pointer; }
    .section-label { font-size: .7rem; color: rgba(251,146,60,.7); text-transform: uppercase; letter-spacing: .7px; font-weight: 600; }

    /* RECETAS */
    .budget-row { display: flex; gap: .5rem; align-items: center; }
    .budget-input { flex: 1; padding: .82rem 1rem; border-radius: 13px; border: 1.5px solid rgba(255,255,255,.1); background: rgba(255,255,255,.06); color: #fff; font-size: .95rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s; }
    .budget-input:focus { border-color: rgba(251,146,60,.5); }
    .budget-input::placeholder { color: rgba(255,255,255,.3); }
    .budget-btn { padding: .82rem 1.1rem; border-radius: 13px; border: none; background: linear-gradient(135deg,#ea580c,#f97316); color: #fff; font-size: .88rem; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; box-shadow: 0 4px 16px rgba(234,88,12,.3); }
    .ingredientes-wrap { display: flex; flex-direction: column; gap: .4rem; }
    .ing-label { font-size: .7rem; color: rgba(251,146,60,.7); text-transform: uppercase; letter-spacing: .7px; font-weight: 600; }
    .ing-chips { display: flex; flex-wrap: wrap; gap: .35rem; }
    .ing-chip { padding: .35rem .75rem; border-radius: 20px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05); color: rgba(255,255,255,.7); font-size: .75rem; cursor: pointer; transition: all .18s; font-family: 'DM Sans', sans-serif; }
    .ing-chip.selected { background: rgba(251,146,60,.15); border-color: rgba(251,146,60,.45); color: #fb923c; }
    .recetas-output { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 16px; padding: 1rem; min-height: 120px; font-size: .86rem; line-height: 1.7; color: rgba(255,255,255,.85); }

    @media(min-width:600px){ .messages{ max-height:480px; } }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="wrapper">
    <header>
      <div class="logo-icon">🛒</div>
      <div>
        <div class="logo-text">AhorraYa</div>
        <div class="logo-sub">Asistente de ahorro inteligente</div>
      </div>
      <div class="badge">IA Activa</div>
    </header>

    <!-- STORE SELECTOR -->
    <div class="store-bar">
      <button class="store-btn active" onclick="selectStore(this,'walmart')"><span class="store-dot"></span>Walmart</button>
      <button class="store-btn" onclick="selectStore(this,'bodega')"><span class="store-dot"></span>Bodega Aurrerá</button>
      <button class="store-btn" onclick="selectStore(this,'chedraui')"><span class="store-dot"></span>Chedraui</button>
      <button class="store-btn" onclick="selectStore(this,'soriana')"><span class="store-dot"></span>Soriana</button>
      <button class="store-btn" onclick="selectStore(this,'mercado')"><span class="store-dot"></span>🏪 Mercado local</button>
    </div>

    <main>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('chat')">💬 Asistente</button>
        <button class="tab-btn" id="list-tab-btn" onclick="switchTab('list')">🛒 Mi Lista</button>
        <button class="tab-btn" onclick="switchTab('canasta')">🧺 Canasta Básica</button>
        <button class="tab-btn" onclick="switchTab('recetas')">🍽️ Recetas</button>
      </div>

      <!-- CHAT -->
      <div class="panel active" id="panel-chat">
        <div class="messages" id="messages"></div>
        <div class="quick-wrap" id="quick-wrap">
          <button class="quick-btn" onclick="sendQuick('¿Cómo ahorrar en proteínas como pollo o carne?')">🥩 Ahorrar en proteínas</button>
          <button class="quick-btn" onclick="sendQuick('¿Cuándo hay mejores ofertas en mi tienda?')">📅 Días de oferta</button>
          <button class="quick-btn" onclick="sendQuick('¿Qué marcas propias me recomiendas?')">🏷️ Marcas propias</button>
          <button class="quick-btn" onclick="sendQuick('¿Cómo ahorrar en frutas y verduras?')">🥦 Frutas y verduras</button>
        </div>
        <div class="input-row">
          <input class="chat-input" id="chat-input" placeholder="Pregunta algo sobre ahorro..." onkeydown="if(event.key==='Enter'&&!loading)sendChat()" />
          <button class="send-btn" id="send-btn" onclick="sendChat()">➤</button>
        </div>
      </div>

      <!-- LIST -->
      <div class="panel" id="panel-list">
        <div class="input-row">
          <input class="list-input" id="list-input" placeholder="Agrega un producto (ej: leche, pollo...)" onkeydown="if(event.key==='Enter')addItem()" />
          <button class="add-btn" onclick="addItem()">+</button>
        </div>
        <div class="list-stats" id="list-stats" style="display:none">
          <div class="stat-pill"><div class="stat-num" id="stat-total">0</div><div class="stat-label">productos</div></div>
          <div class="stat-pill"><div class="stat-num" id="stat-done">0</div><div class="stat-label">comprados</div></div>
          <div class="stat-pill"><div class="stat-num" id="stat-left">0</div><div class="stat-label">pendientes</div></div>
        </div>
        <div class="empty" id="empty-state"><span class="empty-icon">🛒</span>Tu lista está vacía.<br>Agrega productos o importa<br><strong style="color:rgba(251,146,60,.75)">desde la canasta básica</strong></div>
        <div class="items-list" id="items-list"></div>
        <button class="analyze-btn" id="analyze-btn" onclick="analyzeList()" disabled>✨ Analizar lista en <span id="store-name">Walmart</span></button>
      </div>

      <!-- CANASTA BÁSICA -->
      <div class="panel" id="panel-canasta">
        <div class="section-label">Selecciona los productos que necesitas</div>
        <div class="canasta-grid" id="canasta-grid"></div>
        <div class="canasta-actions">
          <button class="canasta-add-btn" onclick="addCanastaToList()">➕ Agregar a mi lista</button>
          <button class="canasta-analyze-btn" onclick="analyzaCanasta()">✨ Analizar precios</button>
        </div>
      </div>

      <!-- RECETAS -->
      <div class="panel" id="panel-recetas">
        <div class="section-label">¿Con cuánto presupuesto cuentas?</div>
        <div class="budget-row">
          <input class="budget-input" id="budget-input" type="number" placeholder="Ej: 300" />
          <button class="budget-btn" onclick="getRecetas()">Ver recetas 🍽️</button>
        </div>
        <div class="ingredientes-wrap">
          <div class="ing-label">¿Qué tienes en casa? (opcional)</div>
          <div class="ing-chips" id="ing-chips"></div>
        </div>
        <div class="recetas-output" id="recetas-output" style="display:none"></div>
      </div>
    </main>
  </div>

  <script>
    const WORKER_URL = 'https://ahorraya-proxy.clioramirez49.workers.dev';

    const TIENDAS = {
      walmart:  { nombre: 'Walmart', emoji: '🔵', tips: 'En Walmart busca la marca Great Value para ahorrar hasta 40%. Los martes y miércoles hay descuentos en carnes y productos frescos. Usa la app de Walmart para cupones exclusivos.' },
      bodega:   { nombre: 'Bodega Aurrerá', emoji: '🟡', tips: 'Bodega Aurrerá tiene los precios más bajos de la cadena Walmart. Busca las marcas Great Value y Equate. Los miércoles renuevan ofertas en abarrotes.' },
      chedraui: { nombre: 'Chedraui', emoji: '🟠', tips: 'En Chedraui los jueves es el "Día del Ahorro" con descuentos en toda la tienda. La marca Precio Uno es su opción económica de calidad. Revisa las ofertas de la semana en la entrada.' },
      soriana:  { nombre: 'Soriana', emoji: '🔴', tips: 'En Soriana los lunes arrancan ofertas en abarrotes. La marca Soriana Básico es muy económica en lácteos y cereales. Acumula puntos con la tarjeta de lealtad para descuentos.' },
      mercado:  { nombre: 'Mercado local', emoji: '🏪', tips: 'El mercado local puede ser hasta 40% más barato en frutas, verduras y carnes frescas. Llega temprano para mejor selección. Compra al mayoreo con el mismo vendedor para conseguir precio.' }
    };

    const CANASTA = [
      { id:'huevo',     icon:'🥚', nombre:'Huevo' },
      { id:'leche',     icon:'🥛', nombre:'Leche' },
      { id:'queso',     icon:'🧀', nombre:'Queso' },
      { id:'frijoles',  icon:'🫘', nombre:'Frijoles' },
      { id:'arroz',     icon:'🍚', nombre:'Arroz' },
      { id:'lentejas',  icon:'🟤', nombre:'Lentejas' },
      { id:'pasta',     icon:'🍝', nombre:'Pasta' },
      { id:'pollo',     icon:'🍗', nombre:'Pollo' },
      { id:'carne_res', icon:'🥩', nombre:'Carne de res' },
      { id:'puerco',    icon:'🐷', nombre:'Carne de puerco' },
      { id:'atun',      icon:'🐟', nombre:'Atún en lata' },
      { id:'aceite',    icon:'🫙', nombre:'Aceite' },
      { id:'azucar',    icon:'🍬', nombre:'Azúcar' },
      { id:'sal',       icon:'🧂', nombre:'Sal' },
      { id:'tortillas', icon:'🫓', nombre:'Tortillas' },
      { id:'pan',       icon:'🍞', nombre:'Pan' },
      { id:'jitomate',  icon:'🍅', nombre:'Jitomate' },
      { id:'cebolla',   icon:'🧅', nombre:'Cebolla' },
      { id:'papa',      icon:'🥔', nombre:'Papa' },
      { id:'chile',     icon:'🌶️', nombre:'Chile' },
    ];

    const INGREDIENTES = ['huevo','pollo','frijoles','arroz','papa','jitomate','cebolla','chile','pasta','carne','queso','leche','atún','lentejas','tortillas'];

    let tiendaActual = 'walmart';
    let history = [], items = [], idCounter = 0, loading = false;
    let canastaSelected = new Set();
    let ingSelected = new Set();

    // ── TIENDA ──
    function selectStore(btn, tienda) {
      document.querySelectorAll('.store-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      tiendaActual = tienda;
      document.getElementById('store-name').textContent = TIENDAS[tienda].nombre;
    }

    // ── TABS ──
    function switchTab(t) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => {
        const ids = ['chat','list','canasta','recetas'];
        b.classList.toggle('active', ids[i] === t);
      });
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-'+t).classList.add('active');
    }

    // ── UTILS ──
    function fmt(t) { return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }

    function appendMsg(role, html) {
      const box = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'msg-row '+role;
      row.innerHTML = role==='assistant'
        ? `<div class="avatar">🤖</div><div class="bubble assistant">${html}</div>`
        : `<div class="bubble user">${html}</div>`;
      box.appendChild(row); box.scrollTop = box.scrollHeight;
    }

    function showTyping() {
      const box = document.getElementById('messages');
      const row = document.createElement('div');
      row.className='msg-row assistant'; row.id='typing';
      row.innerHTML=`<div class="avatar">🤖</div><div class="bubble assistant"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
      box.appendChild(row); box.scrollTop=box.scrollHeight;
    }
    function hideTyping() { document.getElementById('typing')?.remove(); }
    function hideQuick() { const q=document.getElementById('quick-wrap'); if(q) q.style.display='none'; }
    function setLoading(v) { loading=v; document.getElementById('send-btn').disabled=v; }

    // ── API ──
    async function callAPI(userContent, displayContent) {
      const shown = displayContent || userContent;
      appendMsg('user', shown);
      hideQuick();
      history.push({ role:'user', content: userContent });
      setLoading(true); showTyping();

      const tienda = TIENDAS[tiendaActual];
      const system = `Eres "AhorraYa", experto en ahorro en supermercados de México.
El usuario está comprando en: ${tienda.nombre}. ${tienda.tips}
Da consejos específicos para esa tienda. Menciona precios en pesos mexicanos.
Usa emojis, sé amigable y concreto. Responde siempre en español.`;

      try {
        const res = await fetch(WORKER_URL, {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:1000, system, messages: history })
        });
        const data = await res.json();
        const reply = data.content?.map(b=>b.text||'').join('') || 'Sin respuesta.';
        history.push({ role:'assistant', content:reply });
        hideTyping(); appendMsg('assistant', fmt(reply));
      } catch(e) {
        hideTyping(); appendMsg('assistant','⚠️ Error de conexión. Intenta de nuevo.');
      }
      setLoading(false);
    }

    async function callAPISimple(system, userContent) {
      try {
        const res = await fetch(WORKER_URL, {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:1000, system, messages:[{ role:'user', content: userContent }] })
        });
        const data = await res.json();
        return data.content?.map(b=>b.text||'').join('') || 'Sin respuesta.';
      } catch(e) { return '⚠️ Error de conexión. Intenta de nuevo.'; }
    }

    function sendChat() {
      const inp = document.getElementById('chat-input');
      const val = inp.value.trim();
      if (!val || loading) return;
      inp.value='';
      callAPI(val);
    }

    function sendQuick(text) { callAPI(text); }

    // ── LIST ──
    function addItem(nombre) {
      const inp = document.getElementById('list-input');
      const val = nombre || inp.value.trim();
      if (!val) return;
      items.push({ id:++idCounter, name:val, checked:false });
      if (!nombre) inp.value='';
      renderList();
    }

    function toggleItem(id) { const i=items.find(x=>x.id===id); if(i){i.checked=!i.checked; renderList();} }
    function removeItem(id) { items=items.filter(i=>i.id!==id); renderList(); }

    function renderList() {
      const list=document.getElementById('items-list');
      const empty=document.getElementById('empty-state');
      const stats=document.getElementById('list-stats');
      const btn=document.getElementById('analyze-btn');
      const tabBtn=document.getElementById('list-tab-btn');
      const done=items.filter(i=>i.checked).length;
      list.innerHTML='';
      empty.style.display=items.length?'none':'block';
      stats.style.display=items.length?'flex':'none';
      btn.disabled=!items.length;
      document.getElementById('stat-total').textContent=items.length;
      document.getElementById('stat-done').textContent=done;
      document.getElementById('stat-left').textContent=items.length-done;
      tabBtn.innerHTML=`🛒 Mi Lista${items.length?`<span class="tab-count">${items.length}</span>`:''}`;
      items.forEach(item=>{
        const row=document.createElement('div');
        row.className='item-row'+(item.checked?' done':'');
        row.innerHTML=`<div class="item-check ${item.checked?'checked':''}" onclick="toggleItem(${item.id})">${item.checked?'✓':''}</div><span class="item-name ${item.checked?'done':''}">${item.name}</span><button class="rm-btn" onclick="removeItem(${item.id})">✕</button>`;
        list.appendChild(row);
      });
    }

    function analyzeList() {
      if(!items.length) return;
      const tienda = TIENDAS[tiendaActual];
      const text = items.map(i=>`- ${i.name}`).join('\n');
      switchTab('chat');
      callAPI(
        `Analiza esta lista de compras para ${tienda.nombre} y dime cómo ahorrar en cada producto:\n${text}`,
        `📋 Analizar lista en ${tienda.nombre} (${items.length} productos)`
      );
    }

    // ── CANASTA ──
    function renderCanasta() {
      const grid = document.getElementById('canasta-grid');
      grid.innerHTML = '';
      CANASTA.forEach(p => {
        const div = document.createElement('div');
        div.className = 'canasta-item' + (canastaSelected.has(p.id)?' selected':'');
        div.onclick = () => {
          canastaSelected.has(p.id) ? canastaSelected.delete(p.id) : canastaSelected.add(p.id);
          renderCanasta();
        };
        div.innerHTML = `<span class="canasta-icon">${p.icon}</span><span class="canasta-name">${p.nombre}</span><div class="canasta-check">${canastaSelected.has(p.id)?'✓':''}</div>`;
        grid.appendChild(div);
      });
    }

    function addCanastaToList() {
      const selected = CANASTA.filter(p => canastaSelected.has(p.id));
      if (!selected.length) { alert('Selecciona al menos un producto'); return; }
      selected.forEach(p => {
        if (!items.find(i => i.name.toLowerCase() === p.nombre.toLowerCase())) addItem(p.nombre);
      });
      switchTab('list');
    }

    async function analyzaCanasta() {
      const selected = CANASTA.filter(p => canastaSelected.has(p.id));
      if (!selected.length) { alert('Selecciona al menos un producto'); return; }
      const tienda = TIENDAS[tiendaActual];
      const text = selected.map(p=>`- ${p.nombre}`).join('\n');
      switchTab('chat');
      callAPI(
        `Analiza estos productos de la canasta básica para comprar en ${tienda.nombre} y dame los mejores consejos de ahorro y precios aproximados en pesos:\n${text}`,
        `🧺 Analizar canasta básica en ${tienda.nombre}`
      );
    }

    // ── RECETAS ──
    function renderIngChips() {
      const wrap = document.getElementById('ing-chips');
      wrap.innerHTML = '';
      INGREDIENTES.forEach(ing => {
        const btn = document.createElement('button');
        btn.className = 'ing-chip' + (ingSelected.has(ing)?' selected':'');
        btn.textContent = ing;
        btn.onclick = () => { ingSelected.has(ing)?ingSelected.delete(ing):ingSelected.add(ing); renderIngChips(); };
        wrap.appendChild(btn);
      });
    }

    async function getRecetas() {
      const presupuesto = document.getElementById('budget-input').value;
      if (!presupuesto) { alert('Escribe tu presupuesto'); return; }
      const output = document.getElementById('recetas-output');
      output.style.display = 'block';
      output.innerHTML = '<div class="dots" style="padding:.5rem 0"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

      const ingredientes = ingSelected.size > 0 ? `\nTengo en casa: ${[...ingSelected].join(', ')}.` : '';
      const system = `Eres un chef mexicano experto en cocina económica. Sugiere recetas mexicanas tradicionales y prácticas según el presupuesto del usuario. Da entre 3 y 4 recetas con: nombre, ingredientes con costo aproximado en pesos mexicanos, y pasos breves. Prioriza platillos comunes en México: guisados, sopas, arroces, caldos. Usa emojis. Responde en español.`;
      const prompt = `Mi presupuesto es de $${presupuesto} pesos para esta semana.${ingredientes}\n¿Qué recetas mexicanas económicas me recomiendas?`;

      const reply = await callAPISimple(system, prompt);
      output.innerHTML = fmt(reply);
    }

    // ── INIT ──
    renderCanasta();
    renderIngChips();
    appendMsg('assistant', `¡Hola! 👋 Soy <strong>AhorraYa</strong>, tu asistente de ahorro en el súper.<br><br>🏪 <strong>Elige tu tienda</strong> arriba para recibir consejos personalizados.<br>🛒 <strong>Mi Lista</strong> — agrega productos y analiza cómo ahorrar.<br>🧺 <strong>Canasta Básica</strong> — selecciona lo que necesitas rápido.<br>🍽️ <strong>Recetas</strong> — dime tu presupuesto y te sugiero platillos mexicanos.<br><br>¿Por dónde empezamos? 🧡`);
  </script>
</body>
</html>
